<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style_sobre.css">
    <link rel="shortcut icon" href="assets/icones/icon.png" type="image/x-icon">
    <title>MetalTech</title>
</head>

<body>
    <main>
        <section class="list-container">
            
        </section>
        <section>
            <div class="modal fade" id="modalConfirm" tabindex="-1" aria-labelledby="modalConfirmLabel"

                    <div class="modal-content rounded-0 border-0">

                                        <path d="M3 8l3.5 3.5L13 5" stroke="#1C3D5A" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round" />
                                    </svg>
                                </div>
                                <span id="modalConfirmLabel" class="modal-titulo">Confira Ferramenta adicionada no
                                    Histórico</span>
                            </div>
                            <button type="button" class="btn-close btn-close-white ms-auto" data-bs-dismiss="modal"
                                aria-label="Fechar">
                            </button>
                        </div>
        </section>
