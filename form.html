<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style_form.css">
    <link rel="shortcut icon" href="assets/icones/icon.png" type="image/x-icon">
    <title>MetalTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
</head>

<body>
    <main>
        <div class="global-container">
            <section class="info-container">
                <h2 class="info-title">Formulário MetalTech</h2>
                <label class="info_text-pri" for="nm-tool">Nome da Ferramenta:
                    <input class="info__form-text_pri" type="text" id="nm-tool" name="nm-tool" autocomplete="off">
                </label>

                <label class="info_text-sec" for="tipos">Tipo de Ferramenta:
                    <select name="tipos" id="tipos">
                        <option selected disabled>Selecione</option>
                        <option value="manual">Manual</option>
                        <option value="corte-e-usinagem">Corte e Usinagem</option>
                        <option value="corte">Corte</option>
                        <option value="aco">Aço</option>
                    </select>
                </label>

                <label class="info_text-terc">Quantidade:
                    <input class="info__form-text_terc" type="text" autocomplete="off">
                </label>

                <label class="info_text-quart" for="setores">Setor:
                    <select name="setores" id="setores">
                        <option selected disabled>Selecione</option>
                        <option value="automotivo">Automotivo</option>
                        <option value="construcao-civil">Construção Civil</option>
                        <option value="metal-mecanico">Metalmecânico</option>
                        <option value="eletro-eletronica">Eletroeletrônica</option>
                    </select>
                </label>
                <label class="info_text-quint">Código:
                    <input class="info__form-text_quint" type="text" autocomplete="off">
                </label>
                <button type="submit" class="info__btn-confirm">Confirmar</button>
            </section>

            <aside class="description-container">
                <a href="index.html" class="text-decoration-none">
                    <img src="assets/icones/logo.png">
                </a>
                <h2 class="decription__text">Somos uma empresa que constroi com solidez...<br>seus sonhos.</h2>
            </aside>

            <footer>
                <div id="footer_Total">
                    <h3>
                        2026 © Desenvolvido por Joknean,Liandra e Micael | Projeto
                        fictício sem fins comerciais
                    </h3>
                </div>
            </footer>
        </div>
    </main>
</body>
